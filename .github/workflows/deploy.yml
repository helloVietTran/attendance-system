name: Deploy Attendance System to EC2

on:
  push:
    branches:
      - main  # Pipeline sẽ chạy mỗi khi bạn push code vào nhánh main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            cd ~/attendance-system
            git stash                  # Tạm thời cất các thay đổi local trên EC2 nếu có
            git pull origin main       # Kéo code mới nhất từ GitHub về EC2
            sudo docker compose up -d --build  # Re-build lại hệ thống với code mới