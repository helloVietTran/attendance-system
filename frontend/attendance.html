<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="stylesheet" href="./css/variables.css" />
    <link rel="stylesheet" href="./css/shared.css" />
    <link rel="stylesheet" href="./css/attendance.css" />
    <title>Chấm công</title>
  </head>
  <body>
    <div class="d-flex">
      <!-- Header -->
      <button
        id="menu-toggle"
        class="btn d-md-none"
        style="position: fixed; top: 10px; left: 15px; z-index: 1100"
      >
        <i class="fa-solid fa-bars"></i>
      </button>
      <nav id="sidebar-container" class="border-end shadow-sm"></nav>
      <div id="sidebar-overlay"></div>
      <!-- Header -->

      <div class="main-wrapper">
        <header id="header-container"></header>
        <div class="p-4">
          <div>
            <h2 style="color: #262626; margin-bottom: 5px; font-weight: 500">
              Chấm công
            </h2>
            <p style="color: #888; font-size: 14px">
              Vui lòng đảm bảo khuôn mặt rõ ràng trong khung hình trước khi nhấn
              nút.
            </p>
          </div>

          <div class="card-light p-4 mb-4">
            <div class="action-buttons">
              <button
                id="btn-register-face"
                class="btn btn-outline-primary btn-attendance"
                onclick="openRegisterFaceModal()"
              >
                <i class="fa-solid fa-face-smile me-2"></i> Lấy khuôn mặt
              </button>

              <button
                id="btn-check-in"
                class="btn btn-success btn-attendance"
                onclick="startAttendanceCheck()"
              >
                <i class="fa-solid fa-fingerprint me-2"></i> Điểm danh
              </button>
            </div>
          </div>

          <div class="table-wrapper card-light">
            <h3 class="table-title">Lịch sử chấm công hôm nay</h3>
            <table class="reports-table">
              <thead>
                <tr>
                  <th>Ngày</th>
                  <th>Giờ bắt đầu ca</th>
                  <th>Giờ kết thúc ca</th>
                  <th>Thời điểm chấm</th>
                  <th>Trạng thái</th>
                </tr>
              </thead>
              <tbody id="attendance-log-tbody">
                <tr>
                  <td colspan="6" class="empty-state-cell">
                    Đang tải dữ liệu log...
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>

    <div class="toast-container position-fixed bottom-0 end-0 p-3">
      <div
        id="liveToast"
        class="toast align-items-center text-white border-0"
        role="alert"
        aria-live="assertive"
        aria-atomic="true"
      >
        <div class="d-flex">
          <div class="toast-body" id="toast-message"></div>
          <button
            type="button"
            class="btn-close btn-close-white me-2 m-auto"
            data-bs-dismiss="toast"
          ></button>
        </div>
      </div>
    </div>

    <div
      class="modal fade"
      id="cameraModal"
      tabindex="-1"
      aria-hidden="true"
      data-bs-backdrop="static"
    >
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">Xác thực khuôn mặt</h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
              onclick="stopVideoStream()"
            ></button>
          </div>
          <div class="modal-body text-center">
            <div
              class="camera-container"
              style="
                background: #000;
                border-radius: 8px;
                overflow: hidden;
                position: relative;
              "
            >
              <video
                id="video"
                width="100%"
                height="auto"
                autoplay
                playsinline
              ></video>
              <canvas id="canvas" style="display: none"></canvas>
              <div
                id="camera-loading"
                class="position-absolute top-50 start-50 translate-middle text-white"
              >
                <div class="spinner-border" role="status"></div>
              </div>
            </div>
            <p class="mt-3 text-muted small">
              Vui lòng nhìn thẳng vào camera và giữ yên.
            </p>
          </div>
          <div class="modal-footer">
            <button
              type="button"
              class="btn btn-secondary"
              data-bs-dismiss="modal"
              onclick="stopVideoStream()"
            >
              Hủy
            </button>
            <button
              type="button"
              class="btn btn-primary"
              id="snap"
              onclick="captureAndSendImage()"
            >
              <i class="fa-solid fa-circle-dot me-2"></i>Chụp ảnh & Điểm danh
            </button>
          </div>
        </div>
      </div>
    </div>

    <div
      class="modal fade"
      id="registerFaceModal"
      tabindex="-1"
      aria-hidden="true"
    >
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">
              <i class="fa-solid fa-user-plus me-2"></i>Đăng ký khuôn mặt mới
            </h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
            ></button>
          </div>
          <div class="modal-body">
            <div class="mb-3">
              <label class="form-label fw-bold">Tìm kiếm nhân viên</label>
              <div class="input-group">
                <input
                  type="text"
                  id="search-employee-input"
                  class="form-control"
                  placeholder="Nhập tên hoặc mã NV..."
                />
                <button
                  class="btn btn-outline-secondary"
                  type="button"
                  onclick="searchEmployee()"
                >
                  <i class="fa-solid fa-magnifying-glass"></i>
                </button>
              </div>
            </div>

            <div
              id="search-results"
              class="list-group mt-2"
              style="max-height: 200px; overflow-y: auto"
            ></div>

            <div
              id="selected-employee-info"
              class="mt-3 p-3 border rounded bg-light d-none"
            >
              <p class="mb-1">
                Đang chọn: <strong id="selected-emp-name"></strong>
              </p>
              <p class="mb-0 small text-muted">
                ID: <span id="selected-emp-id"></span>
              </p>
            </div>
          </div>
          <div class="modal-footer">
            <button
              type="button"
              class="btn btn-secondary"
              data-bs-dismiss="modal"
            >
              Hủy
            </button>
            <button
              type="button"
              id="btn-start-capture"
              class="btn btn-primary"
              disabled
              onclick="openCameraForRegister()"
            >
              Tiếp theo: Chụp ảnh mẫu
            </button>
          </div>
        </div>
      </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script src="./js/constant.js"></script>
    <script src="./js/menu.js"></script>
    <script src="./js/shared.js"></script>
    <script src="./js/attendance.js"></script>
  </body>
</html>
