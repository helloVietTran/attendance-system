<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Đăng ký</title>
    <link rel="stylesheet" href="auth.css">
</head>

<body>

    <div class="login-container">
        <h2>Đăng ký tài khoản</h2>

        <input type="text" id="username" placeholder="Tên đăng nhập" required>
        <input type="email" id="email" placeholder="Email" required>
        <input type="password" id="password" placeholder="Mật khẩu" required>
        <input type="password" id="confirm_password" placeholder="Xác nhận mật khẩu" required>

        <button onclick="register()">Đăng ký</button>

        <p><a href="login.html">Đã có tài khoản? Đăng nhập</a></p>

        <p id="message"></p>
    </div>

    <script src="../../core/js/api.js"></script>
    <script>
        const API_BASE_URL = "http://localhost:8000/api/v1";

        async function register() {
            const username = document.getElementById("username").value;
            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;
            const confirmPassword = document.getElementById("confirm_password").value;

            if (!username || !email || !password || !confirmPassword) {
                document.getElementById("message").innerText = "Vui lòng điền đầy đủ thông tin";
                return;
            }

            if (password !== confirmPassword) {
                document.getElementById("message").innerText = "Mật khẩu xác nhận không khớp";
                return;
            }

            try {
                const res = await fetch(API_BASE_URL + "/auth/register", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ username, email, password })
                });

                const data = await res.json();

                if (res.status === 201 || res.status === 200) {
                    document.getElementById("message").innerText = "Đăng ký thành công! Vui lòng đăng nhập.";
                    setTimeout(() => {
                        window.location.href = "login.html";
                    }, 2000);
                } else {
                    document.getElementById("message").innerText = data.detail || "Đăng ký thất bại";
                }

            } catch (e) {
                console.error(e);
                document.getElementById("message").innerText = "Lỗi kết nối";
            }
        }
    </script>

</body>

</html>
