<div class="settings-form-container" style="padding: 20px;">
    <h2 style="color: var(--text-light); margin-bottom: 25px; font-weight: 500;">Time Tracking</h2>

    <form>
        <div class="form-group" style="margin-bottom: 20px;">
            <label style="display: block; color: var(--text-light); margin-bottom: 8px;">
                Timetracking mode <span style="color: #ff5252;">*</span>
            </label>
            <div style="position: relative;">
                <select
                    style="width: 100%; padding: 10px 15px; background-color: var(--bg-dark); color: white; border: 1px solid var(--border-color); border-radius: 4px; appearance: none; -webkit-appearance: none; cursor: pointer;">
                    <option>[Default] start and end times can be edited</option>
                    <option>Dynamic (no duration)</option>
                    <option>Punch-in / Punch-out</option>
                </select>
                <i class="fa-solid fa-chevron-down"
                    style="position: absolute; right: 15px; top: 50%; transform: translateY(-50%); color: #888; font-size: 12px; pointer-events: none;"></i>
            </div>
        </div>

        <div class="form-group" style="margin-bottom: 20px;">
            <label style="display: block; color: var(--text-light); margin-bottom: 8px;">
                Default start-time (not used in all timetracking modes) <span style="color: #ff5252;">*</span>
            </label>
            <input type="text" value="now"
                style="width: 100%; padding: 10px 15px; background-color: var(--bg-dark); color: white; border: 1px solid var(--border-color); border-radius: 4px;">
        </div>

        <div class="checkbox-group" style="margin-bottom: 25px; display: flex; flex-direction: column; gap: 15px;">

            <div class="switch-container" style="display: flex; align-items: center; justify-content: space-between;">
                <label style="color: var(--text-main); font-size: 14px;">Allow time entries in the future</label>
                <label class="switch">
                    <input type="checkbox">
                    <span class="slider round"></span>
                </label>
            </div>

            <div class="switch-container" style="display: flex; align-items: center; justify-content: space-between;">
                <label style="color: var(--text-main); font-size: 14px;">Allow time entries with an empty
                    duration</label>
                <label class="switch">
                    <input type="checkbox" checked>
                    <span class="slider round"></span>
                </label>
            </div>

            <div class="switch-container" style="display: flex; align-items: center; justify-content: space-between;">
                <label style="color: var(--text-main); font-size: 14px;">Allow overlapping time entries</label>
                <label class="switch">
                    <input type="checkbox" checked>
                    <span class="slider round"></span>
                </label>
            </div>

            <div class="switch-container" style="display: flex; align-items: center; justify-content: space-between;">
                <label style="color: var(--text-main); font-size: 14px;">Allow overbooking of stored budgets</label>
                <label class="switch">
                    <input type="checkbox">
                    <span class="slider round"></span>
                </label>
            </div>
        </div>

        <div class="form-group" style="margin-bottom: 20px;">
            <label style="display: block; color: var(--text-light); margin-bottom: 8px;">
                Permitted number of simultaneously running time entries <span style="color: #ff5252;">*</span>
            </label>
            <input type="number" value="1"
                style="width: 100%; padding: 10px 15px; background-color: var(--bg-dark); color: white; border: 1px solid var(--border-color); border-radius: 4px;">
        </div>

        <div class="form-group" style="margin-bottom: 20px;">
            <label style="display: block; color: var(--text-light); margin-bottom: 8px;">
                Minute selection for From & To <span style="color: #ff5252;">*</span>
            </label>
            <div style="position: relative;">
                <select
                    style="width: 100%; padding: 10px 15px; background-color: var(--bg-dark); color: white; border: 1px solid var(--border-color); border-radius: 4px; appearance: none; -webkit-appearance: none; cursor: pointer;">
                    <option>15</option>
                    <option>5</option>
                    <option>30</option>
                </select>
                <i class="fa-solid fa-chevron-down"
                    style="position: absolute; right: 15px; top: 50%; transform: translateY(-50%); color: #888; font-size: 12px; pointer-events: none;"></i>
            </div>
        </div>

        <div class="form-group" style="margin-bottom: 30px;">
            <label style="display: block; color: var(--text-light); margin-bottom: 8px;">
                Minute selection for Duration <span style="color: #ff5252;">*</span>
            </label>
            <div style="position: relative;">
                <select
                    style="width: 100%; padding: 10px 15px; background-color: var(--bg-dark); color: white; border: 1px solid var(--border-color); border-radius: 4px; appearance: none; -webkit-appearance: none; cursor: pointer;">
                    <option>15</option>
                    <option>5</option>
                    <option>30</option>
                </select>
                <i class="fa-solid fa-chevron-down"
                    style="position: absolute; right: 15px; top: 50%; transform: translateY(-50%); color: #888; font-size: 12px; pointer-events: none;"></i>
            </div>
        </div>

        <div class="form-actions"
            style="border-top: 1px solid var(--border-color); padding-top: 20px; display: flex; justify-content: flex-end;">
            <button type="submit"
                style="background-color: var(--accent-color); color: white; border: none; padding: 10px 25px; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 14px;">
                <i class="fa-solid fa-check" style="margin-right: 8px;"></i> Save settings
            </button>
        </div>

    </form>
</div>
