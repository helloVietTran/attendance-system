<html lang="vi">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/main.min.css" rel="stylesheet" />

  <link rel="stylesheet" href="./css/variables.css" />
  <link rel="stylesheet" href="./css/shared.css" />
  <link rel="stylesheet" href="./css/daily_report.css" />
  <link rel="stylesheet" href="./css/calendar.css" />
  <title>Chấm công - Lịch làm việc</title>
</head>

<body>
  <div class="d-flex">
    <nav id="sidebar-container" class="border-end shadow-sm"></nav>

    <div class="main-wrapper">
      <header id="header-container" style="color: #737373; position: sticky; top: 0; z-index: 100">
        <div style="display: flex; justify-content: space-between; align-items: center; height: 100%; padding: 0 20px;">
          <div class="search-bar"></div>

          <div class="user-profile" style="display: flex; align-items: center; gap: 15px">
            <div id="user-name-badge"
              style="background-color: #ff9800; color: #fff; width: 35px; height: 35px; display: flex; align-items: center; justify-content: center; border-radius: 4px; font-weight: bold; text-transform: uppercase;">
              U
            </div>
            <span id="user-email-display" style="font-size: 14px; font-weight: 500">---</span>

            <button onclick="logout()" class="btn btn-link btn-logout">
              <i class="fa-solid fa-right-from-bracket"></i> Đăng xuất
            </button>
          </div>
        </div>
      </header>

      <div class="p-4">
        <div class="d-flex justify-content-between align-items-center mb-3">
          <h2 style="color: #262626; margin-bottom: 5px; font-weight: 500">
            Lịch làm việc
          </h2>
          <button id="btn-add-makeup" class="btn btn-primary d-none" data-bs-toggle="modal"
            data-bs-target="#makeupModal">
            <i class="fa-solid fa-plus"></i> Tạo ngày làm bù
          </button>
        </div>

        <div class="mb-3 d-flex flex-wrap gap-3 align-items-center note-container">
          <div class="d-flex align-items-center gap-1"><span class="color-box bg-annual"></span> Nghỉ thường niên / Có
            phép</div>
          <div class="d-flex align-items-center gap-1"><span class="color-box bg-emergency"></span> Nghỉ khẩn cấp</div>
          <div class="d-flex align-items-center gap-1"><span class="color-box bg-company_event"></span> Sự kiện công ty
          </div>
          <div class="d-flex align-items-center gap-1"><span class="color-box bg-weekend"></span> Thứ 7, CN</div>
          <div class="d-flex align-items-center gap-1"><span class="color-box bg-makeup border"></span> Ngày làm bù
          </div>
        </div>

        <div id="calendar-container" class="bg-white p-3 rounded shadow-sm">
          <div id="calendar"></div>
        </div>
      </div>
    </div>
  </div>

  <div class="modal fade" id="vacationModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="vacationModalTitle">Quản lý ngày nghỉ</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <form id="vacationForm">
            <input type="hidden" id="vacationDate" name="date" />
            <input type="hidden" id="vacationId" name="id" />
            <div class="mb-3">
              <label class="form-label">Ngày đã chọn:</label>
              <input type="text" class="form-control" id="displayDate" disabled />
            </div>

            <div class="mb-3" id="vacationTypeGroup">
              <label class="form-label">Loại ngày nghỉ:</label>
              <select class="form-select" id="vacationType" required>
                <option value="annual">Nghỉ thường niên / Có phép</option>
                <option value="emergency">Nghỉ khẩn cấp</option>
                <option value="company_event">Sự kiện công ty</option>
              </select>
            </div>

            <div class="mb-3">
              <label class="form-label">Ghi chú (Tên ngày nghỉ):</label>
              <input type="text" class="form-control" id="vacationNote"
                placeholder="Ví dụ: Giỗ tổ Hùng Vương, 30/4..." />
            </div>
          </form>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Hủy</button>
          <button type="button" id="btn-update-vacation" class="btn btn-warning d-none">Cập nhật</button>
          <button type="button" id="btn-delete-vacation" class="btn btn-danger d-none">Xóa ngày nghỉ</button>
          <button type="button" id="btn-save-vacation" class="btn btn-primary">Lưu thông tin</button>
        </div>
      </div>
    </div>
  </div>

  <div class="modal fade" id="makeupModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Tạo ngày làm bù</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <form id="makeupForm">
            <div class="mb-3">
              <label class="form-label">Chọn ngày làm bù (Thứ 7, CN):</label>
              <input type="date" class="form-control" id="makeupDate" required />
            </div>
            <div class="mb-3">
              <label class="form-label">Lý do:</label>
              <input type="text" class="form-control" id="makeupNote" placeholder="Ví dụ: Làm bù do thứ 3 mưa bão..."
                required />
            </div>
          </form>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Hủy</button>
          <button type="button" id="btn-save-makeup" class="btn btn-primary">Lưu ngày làm bù</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>
  <script src="./js/constant.js"></script>
  <script src="./js/menu.js"></script>
  <script src="./js/shared.js"></script>
  <script src="./js/calendar.js"></script>
</body>

</html>
