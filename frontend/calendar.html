<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/main.min.css"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="./css/variables.css" />
    <link rel="stylesheet" href="./css/shared.css" />
    <link rel="stylesheet" href="./css/daily_report.css" />
    <link rel="stylesheet" href="./css/calendar.css" />
    <title>Chấm công - Lịch làm việc</title>
  </head>

  <body>
    <div class="app-container">
      <nav id="sidebar-container" class="border-end shadow-sm"></nav>

      <div class="main-wrapper">
        <header id="header-container">
          <div
            style="
              display: flex;
              justify-content: space-between;
              align-items: center;
              height: 100%;
              padding: 0 20px;
            "
          >
            <div class="search-bar"></div>

            <div
              class="user-profile"
              style="display: flex; align-items: center; gap: 15px"
            >
              <div
                id="user-name-badge"
                style="
                  background-color: #ff9800;
                  color: #fff;
                  width: 35px;
                  height: 35px;
                  display: flex;
                  align-items: center;
                  justify-content: center;
                  border-radius: 4px;
                  font-weight: bold;
                  text-transform: uppercase;
                "
              >
                U
              </div>
              <span
                id="user-email-display"
                style="font-size: 14px; font-weight: 500"
                >---</span
              >

              <button
                onclick="logout()"
                class="btn btn-link btn-logout text-decoration-none"
              >
                <i class="fa-solid fa-right-from-bracket"></i> Đăng xuất
              </button>
            </div>
          </div>
        </header>

        <div id="report-container">
          <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 style="color: #262626; margin: 0; font-weight: 500">
              Lịch làm việc
            </h2>
          </div>
          <div
            class="d-flex align-items-center justify-content-between mb-3 flex-wrap gap-3"
          >
            <div
              class="d-flex flex-wrap gap-3 note-container p-2 px-3 bg-white rounded border shadow-sm align-items-center"
              style="height: fit-content"
            >
              <div class="d-flex align-items-center gap-2">
                <span
                  class="badge"
                  style="
                    background-color: #4caf50;
                    width: 16px;
                    height: 16px;
                    border-radius: 4px;
                  "
                  >&nbsp;</span
                >
                <small class="fw-medium">Nghỉ lễ</small>
              </div>
              <div class="d-flex align-items-center gap-2">
                <span
                  class="badge"
                  style="
                    background-color: #ffc107;
                    width: 16px;
                    height: 16px;
                    border-radius: 4px;
                  "
                  >&nbsp;</span
                >
                <small class="fw-medium">Nghỉ khẩn cấp</small>
              </div>
              <div class="d-flex align-items-center gap-2">
                <span
                  class="badge border bg-white"
                  style="width: 16px; height: 16px; border-radius: 4px"
                  >&nbsp;</span
                >
                <small class="fw-medium">Nghỉ T7 & CN</small>
              </div>
            </div>

            <div class="d-flex gap-2">
              <button
                id="btn-open-compensation"
                class="btn btn-outline-dark shadow-sm d-flex align-items-center"
                disabled
              >
                <i class="fa-solid fa-briefcase me-2"></i>Tạo làm bù
              </button>
              <button
                id="btn-open-vacation"
                class="btn btn-primary shadow-sm d-flex align-items-center"
                disabled
              >
                <i class="fa-solid fa-plus me-2"></i>Tạo ngày nghỉ
              </button>
            </div>
          </div>

          <div
            id="calendar-container"
            class="bg-white p-3 p-md-4 rounded shadow-sm border"
          >
            <div id="calendar"></div>
          </div>
        </div>
      </div>
    </div>

    <div class="modal fade" id="vacationModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow">
          <div
            class="modal-header d-flex flex-column align-items-start border-bottom-0 pb-0"
          >
            <h5 class="modal-title fw-bold">Thiết lập kỳ nghỉ</h5>
            <p class="text-muted mb-0" style="font-size: 0.875rem">
              Quản lý thời gian nghỉ ngơi của hệ thống.
            </p>
          </div>
          <div class="modal-body">
            <form id="vacationForm">
              <input type="hidden" id="vacationId" />
              <div class="row g-3">
                <div class="col-6">
                  <label class="form-label">Từ ngày</label>
                  <input
                    type="date"
                    class="form-control"
                    id="startDate"
                    required
                  />
                </div>
                <div class="col-6">
                  <label class="form-label">Đến ngày</label>
                  <input
                    type="date"
                    class="form-control"
                    id="endDate"
                    required
                  />
                </div>
                <div class="col-12">
                  <label class="form-label">Loại ngày nghỉ</label>
                  <select class="form-select" id="vacationType">
                    <option value="HOLIDAY">Nghỉ lễ (Sinh nhật công ty, Tết âm lịch)</option>
                    <option value="COMPANY_EVENT">Sự kiện (Team building)</option>
                    <option value="EMERGENCY">Nghỉ khẩn cấp (Mưa bão)</option>
                  </select>
                </div>
                <div class="col-12">
                  <label class="form-label">Lý do làm bù</label>
                  <input
                    type="text"
                    class="form-control"
                    id="vacationTitle"
                    placeholder="Tên dịp nghỉ..."
                  />
                </div>
                <div class="col-12">
                  <label class="form-label">Ghi chú</label>
                  <textarea
                    class="form-control"
                    id="vacationDesc"
                    rows="2"
                  ></textarea>
                </div>
              </div>
            </form>
          </div>
          <div class="modal-footer border-top-0">
            <button type="button" class="btn btn-light" data-bs-dismiss="modal">
              Hủy
            </button>
            <button
              type="button"
              id="btn-delete-vacation"
              class="btn btn-danger d-none"
            >
              Xóa
            </button>
            <button
              type="button"
              id="btn-save-vacation"
              class="btn btn-primary px-4"
            >
              Lưu thay đổi
            </button>
          </div>
        </div>
      </div>
    </div>

    <div
      class="modal fade"
      id="compensationModal"
      tabindex="-1"
      aria-hidden="true"
    >
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow">
          <div
            class="modal-header d-flex flex-column align-items-start border-bottom-0 pb-0"
          >
            <h5 class="modal-title fw-bold">Thiết lập làm bù</h5>
            <p class="text-muted mb-0" style="font-size: 0.875rem">
              Đăng ký ngày làm việc bù vào ngày nghỉ.
            </p>
          </div>
          <div class="modal-body">
            <form id="compensationForm">
              <div class="row g-3">
                <div class="col-12">
                  <label class="form-label">Ngày làm bù</label>
                  <input
                    type="date"
                    class="form-control"
                    id="compDate"
                    required
                  />
                </div>
                <div class="col-12">
                  <label class="form-label">Tiêu đề</label>
                  <input
                    type="text"
                    class="form-control"
                    id="compTitle"
                    placeholder="Làm bù cho dịp..."
                  />
                </div>
                <div class="col-12">
                  <label class="form-label">Ghi chú</label>
                  <textarea
                    class="form-control"
                    id="compDesc"
                    rows="2"
                  ></textarea>
                </div>
              </div>
            </form>
          </div>
          <div class="modal-footer border-top-0">
            <button type="button" class="btn btn-light" data-bs-dismiss="modal">
              Hủy
            </button>
            <button
              type="button"
              id="btn-save-compensation"
              class="btn btn-primary px-4"
            >
              Xác nhận làm bù
            </button>
          </div>
        </div>
      </div>
    </div>

    <div
      class="toast-container position-fixed bottom-0 end-0 p-3"
      style="z-index: 1100"
    >
      <div
        id="liveToast"
        class="toast align-items-center text-white bg-success border-0"
        role="alert"
        aria-live="assertive"
        aria-atomic="true"
      >
        <div class="d-flex">
          <div class="toast-body">
            <i class="fa-solid fa-check-circle me-2"></i>
            <span id="toast-message">Gửi yêu cầu thành công!</span>
          </div>
          <button
            type="button"
            class="btn-close btn-close-white me-2 m-auto"
            data-bs-dismiss="toast"
            aria-label="Close"
          ></button>
        </div>
      </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>

    <script src="./js/constant.js"></script>
    <script src="./js/menu.js"></script>
    <script src="./js/shared.js"></script>
    <script src="./js/calendar.js"></script>
  </body>
</html>
