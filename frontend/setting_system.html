<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link rel="stylesheet" href="./css/variables.css" />
    <link rel="stylesheet" href="./css/shared.css" />
    <link rel="stylesheet" href="./css/Setting_System.css" />

    <title>Cài đặt hệ thống</title>
</head>

<body>
    <div class="d-flex">
        <nav id="sidebar-container" class="border-end shadow-sm"></nav>

        <div class="main-wrapper">
            <header id="header-container" style="color: #737373; position: sticky; top: 0; z-index: 100">
                <div
                    style="display: flex; justify-content: space-between; align-items: center; height: 100%; padding: 0 20px;">
                    <div class="search-bar"></div>
                    <div class="user-profile" style="display: flex; align-items: center; gap: 15px">
                        <div id="user-name-badge"
                            style="background-color: #ff9800; color: #fff; width: 35px; height: 35px; display: flex; align-items: center; justify-content: center; border-radius: 4px; font-weight: bold; text-transform: uppercase;">
                            U</div>
                        <span id="user-email-display" style="font-size: 14px; font-weight: 500">---</span>
                        <button onclick="logout()" class="btn btn-link btn-logout">
                            <i class="fa-solid fa-right-from-bracket"></i> Đăng xuất
                        </button>
                    </div>
                </div>
            </header>

            <div class="reports-container p-4">
                <div class="reports-header">
                    <h2 style="color: #262626; margin-bottom: 5px; font-weight: 600;">
                        <i class="fa-solid fa-sliders" style="margin-right: 10px; color: #007bff;"></i>Cài Đặt Hệ Thống
                    </h2>
                    <p style="color: #888; margin-bottom: 20px; font-size: 14px">
                        Quản lý các thông số cơ bản của hệ thống quản lý chấm công
                    </p>
                </div>

                <!-- Alert Container -->
                <div id="alert-container" style="margin-bottom: 20px;"></div>

                <!-- Settings Form -->
                <div class="settings-form card-light" id="settings-form">
                    <div id="settings-container" style="display: grid; gap: 20px;">
                        <div class="text-center" style="padding: 40px; color: #999;">
                            <i class="fa-solid fa-spinner fa-spin" style="font-size: 24px;"></i>
                            <p style="margin-top: 10px;">Đang tải cài đặt...</p>
                        </div>
                    </div>

                    <!-- Action Buttons -->
                    <div
                        style="display: flex; gap: 10px; margin-top: 30px; padding-top: 20px; border-top: 1px solid #f0f0f0;">
                        <button id="save-settings-btn" class="btn-primary">
                            <i class="fa-solid fa-save"></i> Lưu thay đổi
                        </button>
                        <button id="reset-settings-btn" class="btn-reset">
                            <i class="fa-solid fa-rotate-left"></i> Hủy thay đổi
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./js/constant.js"></script>
    <script src="./js/shared.js"></script>
    <script src="./js/menu.js"></script>
    <script src="./js/Setting_System.js"></script>
</body>

</html>
