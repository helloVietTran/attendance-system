<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="stylesheet" href="./css/variables.css" />
    <link rel="stylesheet" href="./css/shared.css" />
    <link rel="stylesheet" href="./css/ot_request.css" />
    <title>QL ngày nghỉ</title>
  </head>
  <body>
    <div class="d-flex">
      <button
        id="menu-toggle"
        class="btn d-md-none"
        style="position: fixed; top: 10px; left: 15px; z-index: 1100"
      >
        <i class="fa-solid fa-bars"></i>
      </button>

      <nav id="sidebar-container"></nav>

      <div id="sidebar-overlay"></div>

      <div class="main-wrapper">
        <header id="header-container"></header>

        <div class="p-4">
          <ul class="nav nav-tabs" id="otTabs" role="tablist">
            <li class="nav-item" role="presentation">
              <button
                class="nav-link active"
                id="my-request-tab"
                data-bs-toggle="tab"
                data-bs-target="#my-request"
                type="button"
                role="tab"
                aria-controls="my-request"
                aria-selected="true"
              >
                <i class="fa-solid fa-user-pen me-2"></i>Yêu cầu của tôi
              </button>
            </li>
            <li
              class="nav-item d-none"
              id="admin-ot-tab-item"
              role="presentation"
            >
              <button
                class="nav-link"
                id="manage-request-tab"
                data-bs-toggle="tab"
                data-bs-target="#manage-request"
                type="button"
                role="tab"
                aria-controls="manage-request"
                aria-selected="false"
              >
                <i class="fa-solid fa-list-check me-2"></i>QL yêu cầu nghỉ phép
              </button>
            </li>
          </ul>

          <div class="tab-content mt-4" id="otTabsContent">
            <!-- MY REQUEST -->
            <div class="tab-pane fade show active" id="my-request">
              <div class="p-4">
                <div
                  class="d-flex flex-column flex-sm-row justify-content-between align-items-start align-items-sm-center mb-4 gap-3"
                >
                  <h3 class="table-title mb-0">Danh sách yêu cầu nghỉ phép</h3>

                  <button
                    class="btn btn-primary btn-sm w-sm-auto d-flex align-items-center justify-content-center shadow-sm"
                    data-bs-toggle="modal"
                    data-bs-target="#addAbsenceModal"
                    style="padding: 8px 16px; border-radius: 6px"
                  >
                    <i class="fa-solid fa-plus me-2"></i>
                    <span>Thêm ngày nghỉ</span>
                  </button>
                </div>

                <div class="table-wrapper ot-card-panel">
                  <table class="reports-table">
                    <thead>
                      <tr>
                        <th>Ngày tạo</th>
                        <th>Từ ngày</th>
                        <th>Đến ngày</th>
                        <th>Loại nghỉ</th>
                        <th>Lý do</th>
                        <th>Trạng thái</th>
                        <th class="text-center">Thao tác</th>
                      </tr>
                    </thead>
                    <tbody id="absence-plans-body">
                      <tr>
                        <td colspan="7" class="empty-state-cell text-center">
                          Đang tải dữ liệu nghỉ phép...
                        </td>
                      </tr>
                    </tbody>
                  </table>
                </div>
              </div>
            </div>

            <!-- MANAGE -->
            <div class="tab-pane fade" id="manage-request">
              <div class="p-4">
                <div class="ot-filter-panel p-3 p-md-4 mb-4">
                  <div class="row g-3 align-items-end">
                    <!-- Search -->
                    <div class="col-md-4">
                      <label class="form-label ot-filter-label"
                        >Tìm kiếm nhân viên</label
                      >
                      <div class="input-group ot-input-group">
                        <span class="input-group-text">
                          <i class="fa-solid fa-magnifying-glass"></i>
                        </span>
                        <input
                          type="text"
                          id="adminSearchName"
                          class="form-control"
                          placeholder="Nhập tên nhân viên..."
                        />
                      </div>
                    </div>

                    <!-- Status -->
                    <div class="col-md-3">
                      <label class="form-label ot-filter-label"
                        >Trạng thái</label
                      >
                      <select
                        id="adminFilterStatus"
                        class="form-select ot-select"
                      >
                        <option value="">Tất cả</option>
                        <option value="PENDING">Chờ duyệt</option>
                        <option value="APPROVED">Đã duyệt</option>
                        <option value="REJECTED">Từ chối</option>
                      </select>
                    </div>

                    <!-- Button -->
                    <div class="col-md-3 d-grid">
                      <button
                        class="btn btn-success ot-action-btn btn-md"
                        onclick="loadAdminAbsenceRequests(1)"
                      >
                        <i class="fa-solid fa-filter me-2"></i>
                        Lọc dữ liệu
                      </button>
                    </div>
                  </div>
                </div>

                <div class="table-wrapper ot-card-panel">
                  <div
                    class="table-header d-flex justify-content-between align-items-center mb-3"
                  >
                    <h3 class="table-title mb-0">
                      Danh sách yêu cầu nghỉ phép toàn công ty
                    </h3>
                  </div>
                  <table class="reports-table">
                    <thead>
                      <tr>
                        <th>Nhân viên</th>
                        <th>Loại nghỉ</th>
                        <th>Từ ngày</th>
                        <th>Đến ngày</th>
                        <th>Lý do</th>
                        <th>Trạng thái</th>
                        <th class="text-center">Hành động</th>
                      </tr>
                    </thead>
                    <tbody id="admin-absence-tbody"></tbody>
                  </table>
                  <div id="admin-absence-pagination"></div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div
      class="modal fade"
      id="addAbsenceModal"
      tabindex="-1"
      aria-hidden="true"
    >
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow-lg rounded-4">
          <div class="modal-header border-0 pb-0">
            <h5 class="modal-title fw-semibold">Tạo yêu cầu nghỉ phép</h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
            ></button>
          </div>

          <form id="addAbsenceForm">
            <div class="modal-body pt-2">
              <div class="row g-3">
                <div class="col-12">
                  <label class="form-label small text-muted"
                    >Loại hình nghỉ</label
                  >
                  <select
                    name="absence_type"
                    class="form-select ot-select"
                    required
                  >
                    <option value="annual">Nghỉ phép năm</option>
                    <option value="maternity">Nghỉ thai sản</option>
                    <option value="wedding">Nghỉ kết hôn</option>
                    <option value="funeral">Nghỉ tang chế</option>
                    <option value="paternity">Nghỉ vợ sinh</option>
                  </select>
                </div>

                <div class="col-6">
                  <label class="form-label small text-muted">Từ ngày</label>
                  <input
                    type="date"
                    class="form-control"
                    name="start_date"
                    required
                  />
                </div>

                <div class="col-6">
                  <label class="form-label small text-muted">Đến ngày</label>
                  <input
                    type="date"
                    class="form-control"
                    name="end_date"
                    required
                  />
                </div>

                <div class="col-12">
                  <label class="form-label small text-muted"
                    >Lý do xin nghỉ</label
                  >
                  <textarea
                    class="form-control"
                    name="reason"
                    rows="3"
                    placeholder="Nhập lý do chi tiết..."
                    maxlength="500"
                  ></textarea>
                </div>
              </div>
            </div>

            <div class="modal-footer border-0 pt-0">
              <button
                type="button"
                class="btn btn-light"
                data-bs-dismiss="modal"
              >
                Hủy
              </button>
              <button type="submit" class="btn btn-primary">Gửi yêu cầu</button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <div class="toast-container position-fixed bottom-0 end-0 p-3">
      <div
        id="liveToast"
        class="toast align-items-center text-white border-0"
        role="alert"
        aria-live="assertive"
        aria-atomic="true"
      >
        <div class="d-flex">
          <div class="toast-body" id="toast-message"></div>
          <button
            type="button"
            class="btn-close btn-close-white me-2 m-auto"
            data-bs-dismiss="toast"
          ></button>
        </div>
      </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script src="./js/constant.js"></script>
    <script src="./js/menu.js"></script>
    <script src="./js/shared.js"></script>
    <script src="./js/absence.js"></script>
  </body>
</html>
