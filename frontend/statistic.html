<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="stylesheet" href="./css/variables.css" />
    <link rel="stylesheet" href="./css/shared.css" />
    <link rel="stylesheet" href="./css/statistic.css" />
    <title>Thống kê</title>
  </head>

  <body>
    <div class="d-flex">
      <!-- Header -->
      <button
        id="menu-toggle"
        class="btn d-md-none"
        style="position: fixed; top: 10px; left: 15px; z-index: 1100"
      >
        <i class="fa-solid fa-bars"></i>
      </button>
      <nav id="sidebar-container" class="border-end shadow-sm"></nav>
      <div id="sidebar-overlay"></div>
      <!-- Header -->

      <div class="main-wrapper">
        <header id="header-container"></header>
        <div class="p-4">
          <div class="row g-4">
            <!-- Bộ lọc -->
            <div class="col-12 d-flex justify-content-end">
              <select
                id="stat-month"
                class="form-select form-select-sm"
                style="max-width: 150px"
              ></select>
            </div>

            <!-- Biểu đồ -->
            <div class="col-12 d-flex justify-content-center">
              <div
                class="card stat-card text-center"
                style="max-width: 400px; width: 100%"
              >
                <div class="card-header">
                  <h6>
                    <i class="fa-solid fa-chart-pie me-2 text-primary"></i>Tỷ lệ
                    chấm công
                  </h6>
                </div>
                <div class="card-body">
                  <canvas id="ratioChart"></canvas>
                </div>
              </div>
            </div>
            <!-- Top chăm chỉ -->
            <div class="col-lg-6">
              <div class="card stat-card h-100">
                <div class="card-header">
                  <h6>Top nhân viên chăm chỉ</h6>
                </div>
                <div class="card-body" id="top-hard-working">Đang tải...</div>
              </div>
            </div>

            <!-- Top về muộn -->
            <div class="col-lg-6">
              <div class="card stat-card h-100">
                <div class="card-header">
                  <h6>Top nhân viên ở lại muộn nhất</h6>
                </div>
                <div class="card-body" id="top-late">Đang tải...</div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="toast-container position-fixed bottom-0 end-0 p-3">
      <div
        id="liveToast"
        class="toast align-items-center text-white border-0"
        role="alert"
        aria-live="assertive"
        aria-atomic="true"
      >
        <div class="d-flex">
          <div class="toast-body" id="toast-message"></div>
          <button
            type="button"
            class="btn-close btn-close-white me-2 m-auto"
            data-bs-dismiss="toast"
          ></button>
        </div>
      </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script src="./js/constant.js"></script>
    <script src="./js/menu.js"></script>
    <script src="./js/shared.js"></script>
    <script src="./js/statistic.js"></script>
  </body>
</html>
